# Blueprint para Render: conecta el repo en el panel y usa "Apply" o despliega como Web Service.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: experiencia-raizoma
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
